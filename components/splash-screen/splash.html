<!-- Splash Screen Template — copy into your HTML <body> -->

<div id="ta-splash" style="
  position: fixed; inset: 0; z-index: 2147483647;
  background: var(--primary-bg, #0a0a1a);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.5s ease, visibility 0.5s ease;
">
  <!-- Logo (replace with your own) -->
  <div style="
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
    animation: splashPulse 1.5s ease-in-out infinite;
  ">⬡</div>

  <!-- Title -->
  <div style="
    margin-top: 20px; font-size: 1.8rem; font-weight: 800;
    letter-spacing: -0.02em; text-align: center;
    background: linear-gradient(135deg, #00ffd5, #00aaff, #00ffd5);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: gradientShift 3s ease infinite;
  ">Your App Name</div>
</div>

<style>
  #ta-splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
  @keyframes splashPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.85; }
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
</style>

<script src="splash.js"></script>
<script>SplashScreen.init({ minDuration: 1500 });</script>
